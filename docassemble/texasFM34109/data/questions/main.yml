question: |
  Please fill out your Child's Full Name and Date of Birth.
fields:
  - Full Name: ChildsFullName
  - Date of Birth: DateOfBirth
    datatype: date
---
question: |
  Please fill out your Full Name, Physical Address, Telephone Number, and any other contact information.
fields:
  - Full Name: FullName1
  - Physical Address: PhysicalAddress1
  - Telephone Number: TelephoneNumber1
  - Other contact information: OtherContactInformation1
    required: False
---
question: |
  Please fill out the other parent's Full Name, Physical Address, Telephone Number, and any other contact information.
fields:
  - Full Name: FullName2
  - Physical Address: PhysicalAddress2
  - Telephone Number: TelephoneNumber2
  - Other contact information: OtherContactInformation2
    required: False
---
question: |
  Please fill out the Voluntary Adult's Full Name, Physical Address, Telephone Number, and any other contact information.
fields:
  - Full Name: Name
  - Physical Address: PhysicalAddress3
  - Telephone Number: TelephoneNumber3
  - Other contact information: OtherContactInformation3
    required: False
---
question: |
  Please select one of the following in relationship to the child.
fields:
  - no label: Caregiver
    input type: radio
    choices:
      - Adult Caregiver: AdultCaregiver
      - Parental Child Safety Voluntary Caregiver: ParentalChildSaftetyPlacementCaregiver
---
question: |
  To the best of your knowledge, this child is not the subject of a current (pre-existing) valid authorization agreement, and no
  parent, guardian, custodian, licensed child-placing agency or other agency makes any claim to
  actual physical possession or care, custody or control of the child that is inconsistent with this
  authorization agreement.
yesno: ThisChildIsNotTheSubjectOfACurrentPreExistingValidAuthorizationAgreementAndNo
---
question: |
  To the best of your knowledge, please select one of the below.
fields:
  - no label: CourtInvolvement
    input type: radio
    choices:
      - There is **no** court involvement with this child.: ThereIsNoCourtInvolvement
      - There **has been** the subject of a court action.: ThereIsHasBeenCourtInvolvement
---
question: |
  If the parent wishes the agreement to expire a date earlier then six months please indicate the date and any circumstances that might be agreed upon to terminate this agreement.
fields:
    - Prior date: EnterIntoTheAgreementIndicateTheDateTheAgreementIsToExpire
      datatype: date
      required: False
    - Optional Circumstances: IfApplicableStateCircumstancesToTerminateTheAgreementBeforeTheExpirationDate
      required: False
---
question: |
