---
metadata:
  title: Authorization Agreement for Voluntary Adult Caregiver
  short title: Texas Voluntary Adult Caregiver
---
### Interview Order ###
mandatory: True
code: |
  FullName1
  FullName2
  ChildsFullName
  FullName3
  Caregiver
  ThisChildIsNotTheSubjectOfACurrentPreExistingValidAuthorizationAgreementAndNo
  CourtInvolvement
  EnterIntoTheAgreementIndicateTheDateTheAgreementIsToExpire
  DisclosuresIncludedInThisAuthorizationAgreement
  ParentSignature_2
  VolunutaryCaregiver_Signature
  fm34109
---
question: |
  Please fill out your Child's Full Name and Date of Birth.
fields:
  - Full Name: ChildsFullName
  - Date of Birth: DateOfBirth
    datatype: date
---
question: |
  Please fill out your Full Name, Physical Address, Telephone Number, and any other contact information.
fields:
  - Full Name: FullName1
  - Physical Address: PhysicalAddress1
  - Telephone Number: TelephoneNumber1
  - Other contact information: OtherContactInformation1
    required: False
---
question: |
  Please fill out the other parent's Full Name, Physical Address, Telephone Number, and any other contact information.
fields:
  - Full Name: FullName2
  - Physical Address: PhysicalAddress2
  - Telephone Number: TelephoneNumber2
  - Other contact information: OtherContactInformation2
    required: False
---
question: |
  Please fill out the **Voluntary** Adult's Full Name, Physical Address, Telephone Number, and any other contact information.
fields:
  - Full Name: FullName3
  - Physical Address: PhysicalAddress3
  - Telephone Number: TelephoneNumber3
  - Other contact information: OtherContactInformation3
    required: False
---
question: |
  Please select one of the following for the **Voluntary Adult's** relationship to the child.
subquestion: |
  Parentarel Safety Placement Voluntary Caregiver in accordance with Child Protective Services if requirements of Texas Family Code, Subchapter L are met
fields:
  - no label: Caregiver
    input type: radio
    choices:
      - Adult Caregiver
      - Parental Child Safety Voluntary Caregiver
---
question: |
  To the best of your knowledge:
subquestion: |
  This child is **not** the subject of a current (pre-existing) valid authorization agreement, and no
  parent, guardian, custodian, licensed child-placing agency or other agency makes any claim to
  actual physical possession or care, custody or control of the child that is inconsistent with this
  authorization agreement.
yesno: ThisChildIsNotTheSubjectOfACurrentPreExistingValidAuthorizationAgreementAndNo
---
question: |
  To the best of your knowledge, please select one of the below.
fields:
  - no label: CourtInvolvement
    input type: radio
    choices:
      - There is **no** court involvement with this child.: no_involvement
      - There **has been** the subject of a court action.: has_been
---
question: |
  If the parent wishes the agreement to expire a date earlier then six months please indicate the date and any circumstances that might be agreed upon to terminate this agreement.
fields:
    - Prior date: EnterIntoTheAgreementIndicateTheDateTheAgreementIsToExpire
      datatype: date
      required: False
    - Optional Circumstances: IfApplicableStateCircumstancesToTerminateTheAgreementBeforeTheExpirationDate
      datatype: area
      required: False
---
question: |
  Please sign here as the parent, or skip for printing.
signature: DisclosuresIncludedInThisAuthorizationAgreement
required: False
---
question: |
  Please sign here as the other parent (if they are with you), or skip for printing.
signature: ParentSignature_2
required: False
---
question: |
  Please sign here as the voluntary adult caregiver, or skip for printing.
signature: VolunutaryCaregiver_Signature
required: False
---
question: Thank you for completing the Texas Voluntary Adult Caregiver form FM-34-109
subquestion: |
  You'll need to print this out, and have a State of Texas Notary Public sigin and validate this.
mandatory: True
attachments:
  - name: FM-34-109
    filename: fm-34-109
    variable name: fm34109
    pdf template file: editable-fm-34-109.pdf
    valid formats:
      - pdf
    fields:
      ChildsFullName: ${ ChildsFullName }
      DateOfBirth: ${ DateOfBirth }
      FullName1: ${ FullName1 }
      PhysicalAddress1: ${ PhysicalAddress1 }
      TelephoneNumber1: ${ TelephoneNumber1 }
      OtherContactInformation1: ${ OtherContactInformation1 }
      FullName2: ${ FullName2 }
      PhysicalAddress2: ${ PhysicalAddress2 }
      TelephoneNumber2: ${ TelephoneNumber2 }
      OtherContactInformation2: ${ OtherContactInformation2 }
      Name: ${ FullName3 }
      PhysicalAddress3: ${ PhysicalAddress3 }
      TelephoneNumber3: ${ TelephoneNumber3 }
      OtherContactInformation3: ${ OtherContactInformation3 }
      AdultCaregiver: ${ Caregiver[0] }
      ParentalChildSaftetyPlacementCaregiver: ${ Caregiver[1] }
      ThisChildIsNotTheSubjectOfACurrentPreExistingValidAuthorizationAgreementAndNo: ${ ThisChildIsNotTheSubjectOfACurrentPreExistingValidAuthorizationAgreementAndNo }
      ThereIsNoCourtInvolvement: ${ CourtInvolvement[0] }
      ThereIsHasBeenCourtInvolvement: ${ CourtInvolvement[1] }
      EnterIntoTheAgreementIndicateTheDateTheAgreementIsToExpire: ${ EnterIntoTheAgreementIndicateTheDateTheAgreementIsToExpire }
      IfApplicableStateCircumstancesToTerminateTheAgreementBeforeTheExpirationDate: ${ IfApplicableStateCircumstancesToTerminateTheAgreementBeforeTheExpirationDate }
      DisclosuresIncludedInThisAuthorizationAgreement: ${ DisclosuresIncludedInThisAuthorizationAgreement }
      PrintedName1: ${ FullName1 }
      ParentSignature_2: ${ ParentSignature_2 }
      PrintedName2: ${ FullName2 }
      VolunutaryCaregiver_Signature: ${ VolunutaryCaregiver_Signature }
      PrintedName3: ${ FullName3 }


